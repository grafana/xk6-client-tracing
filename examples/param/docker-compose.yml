services:
  k6-tracing:
    image: ghcr.io/grafana/xk6-client-tracing:latest
    command:
      - run
      - /param.js
    volumes:
      - ./param.js:/param.js:ro
    depends_on:
      - otel-collector
    restart: always

  otel-collector:
    image: otel/opentelemetry-collector:latest
    command:
      - --config=/collector-config.yaml
    volumes:
      - ../shared/collector-config.yaml:/collector-config.yaml:ro
    ports:
      - "13133:13133"
      - "4317:4317"
      - "4318:4318"
